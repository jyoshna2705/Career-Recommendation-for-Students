<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Login OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #f1f5f9;
            font-family: "Segoe UI", sans-serif;
        }

        .otp-shell {
            width: min(100% - 24px, 460px);
        }

        .otp-card {
            border: 0;
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            background: #ffffff;
        }

        .otp-title {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .otp-subtext {
            color: #64748b;
            line-height: 1.6;
        }

        .otp-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .otp-digit {
            width: 100%;
            height: 62px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            text-align: center;
            font-size: 1.7rem;
            font-weight: 700;
            color: #0f172a;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .otp-digit:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
        }

        .otp-button {
            border-radius: 14px;
            padding: 14px 18px;
            font-weight: 600;
        }

        .resend-text {
            color: #64748b;
            font-size: 0.95rem;
        }

        .resend-link {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .timer-text {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        @media (max-width: 576px) {
            .otp-grid {
                gap: 8px;
            }

            .otp-digit {
                height: 54px;
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>
    <div class="otp-shell">
        <div class="card otp-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="otp-title mb-2">Verify Your Account</h1>
                    <p class="otp-subtext mb-0">Enter the 6-digit code sent to your email</p>
                    <p class="text-primary fw-semibold mt-2 mb-0">{{ email }}</p>
                </div>

                {% if error %}
                <div class="alert alert-danger text-center">Invalid OTP</div>
                {% endif %}
                {% if message %}
                <div class="alert alert-success text-center">Verification Successful</div>
                {% endif %}

                <form method="post" id="otpForm">
                    <input type="hidden" name="otp" id="otpValue">

                    <div class="otp-grid mb-4">
                        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code">
                        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1">
                        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1">
                        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1">
                        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1">
                        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1">
                    </div>

                    <button class="btn btn-primary w-100 otp-button" type="submit">Verify OTP</button>

                    <div class="text-center mt-4">
                        <div class="resend-text">Didn't receive code?</div>
                        <a class="resend-link" href="#">Resend OTP</a>
                        <div class="timer-text mt-2">Resend in 30 seconds</div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const otpForm = document.getElementById("otpForm");
        const otpValue = document.getElementById("otpValue");
        const otpDigits = Array.from(document.querySelectorAll(".otp-digit"));

        otpDigits.forEach((input, index) => {
            input.addEventListener("input", () => {
                input.value = input.value.replace(/[^0-9]/g, "").slice(0, 1);
                if (input.value && index < otpDigits.length - 1) {
                    otpDigits[index + 1].focus();
                }
            });

            input.addEventListener("keydown", (event) => {
                if (event.key === "Backspace" && !input.value && index > 0) {
                    otpDigits[index - 1].focus();
                }
            });

            input.addEventListener("paste", (event) => {
                event.preventDefault();
                const pasted = (event.clipboardData.getData("text") || "").replace(/[^0-9]/g, "").slice(0, 6);
                pasted.split("").forEach((digit, digitIndex) => {
                    if (otpDigits[digitIndex]) {
                        otpDigits[digitIndex].value = digit;
                    }
                });
                const nextIndex = Math.min(pasted.length, otpDigits.length - 1);
                otpDigits[nextIndex].focus();
            });
        });

        otpForm.addEventListener("submit", (event) => {
            const combinedOtp = otpDigits.map((input) => input.value).join("");
            if (combinedOtp.length !== 6) {
                event.preventDefault();
                return;
            }
            otpValue.value = combinedOtp;
        });
    </script>
</body>
</html>
