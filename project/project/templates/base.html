<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else "Career Recommendation System" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:opsz@9..40&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a href="{{ url_for('home') }}" class="brand-mark">Career Recommendation System</a>
            <nav class="site-nav">
                <a href="{{ url_for('home') }}" class="nav-link">Home</a>
                {% if 'user_id' in session %}
                <a href="{{ url_for('student_dashboard') }}" class="nav-link">Dashboard</a>
                <a href="{{ url_for('student_profile') }}" class="nav-link">Student Profile</a>
                <a href="{{ url_for('logout') }}" class="nav-link nav-link-accent">Logout</a>
                {% else %}
                <a href="{{ url_for('register') }}" class="nav-link">Register</a>
                <a href="{{ url_for('login') }}" class="nav-link">Login</a>
                {% endif %}
            </nav>
        </div>
    </header>
    {% block content %}{% endblock %}
</body>
</html>
