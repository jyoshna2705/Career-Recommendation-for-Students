<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="mb-3">Reset Password</h2>
                        <p class="text-muted">Set a new password for <strong>{{ email }}</strong>.</p>
                        {% if message %}
                        <div class="alert alert-success">{{ message }}</div>
                        {% endif %}
                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label" for="password">New Password</label>
                                <input class="form-control" id="password" name="password" type="password" minlength="6" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="confirm_password">Confirm Password</label>
                                <input class="form-control" id="confirm_password" name="confirm_password" type="password" minlength="6" required>
                            </div>
                            <button class="btn btn-primary w-100" type="submit">Reset Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
